<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure v2.5</title>
    <style>
        /* ==========================================================================
           VARIABLES DE DISEÑO & PALETA DE COLORES (Estilo Duolingo/Kahoot)
           ========================================================================== */
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #1cb0f6;
            --secondary-dark: #1899d6;
            --accent: #ffc800;
            --accent-dark: #e6b400;
            --wrong: #ea2b2b;
            --correct: #58cc02;
            --bg-main: #f7f7f7;
            --text-dark: #3c3c3c;
            --text-light: #afafaf;
            --card-shadow: 0 8px 0px rgba(0,0,0,0.1);
            --font-stack: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ==========================================================================
           ESTILOS GENERALES Y RESET
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-main);
            color: var(--text-dark);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* ==========================================================================
           COMPONENTES DE INTERFAZ REUTILIZABLES (BOTONES Y TARJETAS)
           ========================================================================== */
        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-align: center;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: var(--secondary-dark); }

        .btn-accent { background: var(--accent); color: var(--text-dark); }
        .btn-accent:hover { background: var(--accent-dark); }

        .card {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
        }

        /* ==========================================================================
           HEADER & NAV BAR
           ========================================================================== */
        header {
            background: white;
            border-bottom: 2px solid #e5e5e5;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            color: var(--secondary);
            font-size: 24px;
            font-weight: 800;
        }

        .global-stats {
            display: flex;
            gap: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .teacher-switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            background: #edf7ff;
            padding: 8px 15px;
            border-radius: 30px;
            border: 2px solid #bee3f8;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--secondary); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* ==========================================================================
           CONTENEDOR PRINCIPAL Y VISTAS
           ========================================================================== */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           VISTA 1: MAPA DE AVENTURA
           ========================================================================== */
        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 40px 0;
        }

        .map-path {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 8px;
            background: #e5e5e5;
            z-index: 1;
        }

        .level-node {
            position: relative;
            z-index: 2;
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .level-bubble {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            border: 4px solid #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #afafaf;
            cursor: not-allowed;
            box-shadow: 0 6px 0 #e5e5e5;
            transition: all 0.1s ease;
        }

        .level-node.unlocked .level-bubble {
            background: var(--secondary);
            border-color: var(--secondary-dark);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--secondary-dark);
        }

        .level-node.completed .level-bubble {
            background: var(--primary);
            border-color: var(--primary-dark);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-dark);
        }

        .level-node.unlocked .level-bubble:active, .level-node.completed .level-bubble:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .level-info-box {
            background: white;
            border: 2px solid #e5e5e5;
            padding: 8px 15px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.05);
        }

        .level-title { font-weight: bold; font-size: 14px; }
        .level-stars { color: var(--accent); font-size: 14px; margin-top: 2px; }

        @media(min-width: 768px) {
            .level-node:nth-child(even) { transform: translateX(-120px); }
            .level-node:nth-child(odd) { transform: translateX(120px); }
        }

        .progress-banner {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .progress-bar-container {
            flex-grow: 1;
            background: #e5e5e5;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #76e211);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* ==========================================================================
           VISTA 2: ENTORNO DE CLASE
           ========================================================================== */
        .step-indicator-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .step-dot {
            height: 8px;
            background: #e5e5e5;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .step-dot.active { background: var(--secondary); }
        .step-dot.completed { background: var(--primary); }

        .subquestion-tracker {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 12px;
        }

        .sub-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #cbd5e1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .sub-badge.current { background: var(--secondary); }
        .sub-badge.correct { background: var(--primary); }
        .sub-badge.wrong { background: var(--wrong); }

        .teacher-box {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            background: #eef9ff;
            border: 2px solid #bce3ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .teacher-avatar {
            font-size: 50px;
            background: white;
            padding: 10px;
            border-radius: 50%;
            border: 2px solid #bce3ff;
            line-height: 1;
        }

        .teacher-speech {
            font-size: 16px;
            line-height: 1.5;
            color: #186590;
        }

        .content-box {
            min-height: 250px;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .example-list { list-style: none; margin-top: 15px; }
        .example-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfdfd;
            border: 2px solid #f0f0f0;
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .example-eng { font-weight: bold; color: var(--secondary-dark); font-size: 18px; }
        .example-esp { color: #666; font-size: 15px; }

        .audio-icon-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #edf7ff;
            border: 2px solid #bee3f8;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        /* ==========================================================================
           DINÁMICAS INTERACTIVAS
           ========================================================================== */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media(min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-card {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #e5e5e5;
            text-align: center;
        }

        .option-card.selected {
            background: #ddf4ff;
            border-color: var(--secondary);
            color: var(--secondary-dark);
            box-shadow: 0 4px 0 var(--secondary);
        }

        .drag-container { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; justify-content: center; }
        
        .drag-item {
            background: white;
            border: 2px solid #e5e5e5;
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #e5e5e5;
            font-size: 18px;
            touch-action: manipulation;
            transition: opacity 0.2s;
        }
        
        .drag-item.used {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: translateY(2px);
        }

        .drop-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 3px dashed #cbd5e1;
            background: #f8fafc;
            min-height: 70px;
            border-radius: 16px;
            padding: 12px;
            font-weight: bold;
            color: #94a3b8;
            margin-top: 15px;
        }
        .drop-zone.hover { background: #edf7ff; border-color: var(--secondary); }

        .drop-zone .drag-item {
            box-shadow: 0 2px 0 #e5e5e5;
            padding: 8px 16px;
            font-size: 16px;
        }

        .text-input-field {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid #e5e5e5;
            font-size: 18px;
            margin-top: 15px;
            outline: none;
        }

        .feedback-panel {
            margin-top: 25px;
            padding: 20px;
            border-radius: 16px;
            display: none;
            font-weight: bold;
        }

        .feedback-panel.correct { background: #d7f7c2; color: #257200; border: 2px solid #b2e693; display: block; }
        .feedback-panel.wrong { background: #ffdfe0; color: #ea2b2b; border: 2px solid #ffb3b5; display: block; }

        .explanation-text { font-weight: normal; font-size: 14px; margin-top: 5px; color: #555; }

        /* ==========================================================================
           VOCABULARIO & FINAL
           ========================================================================== */
        .vocab-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 650px) { .vocab-grid { grid-template-columns: 1fr 1fr; } }
        .vocab-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 15px;
        }
        .vocab-meta h4 { color: var(--secondary-dark); font-size: 18px; }

        .diploma-wrapper {
            background: white;
            border: 10px double #c99738;
            padding: 40px;
            text-align: center;
            max-width: 750px;
            margin: 30px auto;
        }
        .diploma-title { font-family: 'Georgia', serif; font-size: 36px; color: #1a365d; }
        .diploma-name { font-family: 'Georgia', serif; font-size: 28px; font-weight: bold; border-bottom: 2px solid #c99738; display: inline-block; padding: 5px 40px; margin: 20px 0; }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0; height: 60px;
            background: white; border-top: 2px solid #e5e5e5;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-tab { display: flex; flex-direction: column; align-items: center; color: var(--text-light); cursor: pointer; font-weight: bold; font-size: 12px; }
        .nav-tab.active { color: var(--secondary); }
    </style>
</head>
<body>

    <header>
        <div class="brand"><h1>English Adventure</h1></div>
        <div class="global-stats">
            <div class="stat-item"><span>⭐</span> <span id="global-star-count">0</span></div>
            <div class="stat-item"><span>📚</span> <span id="global-vocab-count">0</span></div>
        </div>
        <div class="teacher-switch-container">
            <span>Teacher Mode</span>
            <label class="switch">
                <input type="checkbox" id="teacher-mode-toggle" checked onchange="app.toggleTeacherMode()">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <div class="container">
        <!-- VISTA MAPA -->
        <div id="view-map" class="view active">
            <div class="progress-banner">
                <div>
                    <div>Progreso General</div>
                    <div style="font-size: 24px; color: var(--primary);" id="progress-percentage-text">0%</div>
                </div>
                <div class="progress-bar-container"><div class="progress-bar-fill" id="map-progress-bar"></div></div>
            </div>
            <div class="map-container"><div class="map-path"></div><div id="map-nodes-target" style="width: 100%;"></div></div>
        </div>

        <!-- VISTA ENTORNO DE LECCIÓN -->
        <div id="view-class" class="view">
            <div class="card" style="padding: 15px;">
                <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;" onclick="app.exitToMap()">↩ Mapa</button>
                <span id="class-view-title" style="font-weight: bold; margin-left: 20px; color: var(--secondary-dark);"></span>
            </div>

            <div class="step-indicator-bar">
                <div class="step-dot" id="dot-0"></div>
                <div class="step-dot" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
                <div class="step-dot" id="dot-4"></div>
            </div>

            <div class="teacher-box" id="dynamic-teacher-box">
                <div class="teacher-avatar">👩‍🏫</div>
                <div class="teacher-speech" id="teacher-speech-text"></div>
            </div>

            <div class="card content-box" id="class-content-core"></div>

            <div class="feedback-panel" id="action-feedback-panel">
                <div id="feedback-main-message"></div>
                <div class="explanation-text" id="feedback-explanation-text"></div>
            </div>

            <div class="nav-controls">
                <button class="btn btn-secondary" id="btn-flow-back" onclick="app.flowPrevious()">Atrás</button>
                <button class="btn btn-primary" id="btn-flow-next" onclick="app.flowNext()">Siguiente</button>
            </div>
        </div>

        <!-- VISTA VOCABULARIO -->
        <div id="view-vocabulary" class="view">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>My Vocabulary 📚</h2>
                <button class="btn btn-secondary" style="padding: 8px 16px;" onclick="app.downloadVocabularyJSON()">Exportar (JSON)</button>
            </div>
            <div class="vocab-grid" id="vocab-cards-grid"></div>
        </div>

        <!-- VISTA FINAL -->
        <div id="view-final" class="view">
            <div class="card" style="text-align: center;">
                <h1 style="color: var(--primary); font-size: 42px;">Congratulations! 🎉</h1>
                <div class="diploma-wrapper">
                    <div class="diploma-title">Diploma of Excellence</div>
                    <div class="diploma-name">Master of 4th Grade English</div>
                    <p>¡Has completado con éxito los 10 niveles y superado las 50 preguntas interactivas!</p>
                </div>
                <button class="btn btn-accent" onclick="window.print()">🖨️ Imprimir Diploma</button>
                <button class="btn btn-primary" onclick="app.resetProgress()">🔄 Reiniciar Mapa</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-tab active" id="tab-map" onclick="app.switchTab('map')"><span>🗺️ Aventura</span></div>
        <div class="nav-tab" id="tab-vocab" onclick="app.switchTab('vocab')"><span>📚 Vocabulario</span></div>
    </nav>

    <script>
        /**
         * BANCO DE DATOS ROBUSTO: 10 NIVELES CON 20 PREGUNTAS MIXTAS CADA UNO (200 PREGUNTAS TOTALES)
         */
        const CLASS_DATASET = {
            1: {
                title: "Sports Vocabulary",
                method: "Vocabulary / Speaking",
                vocabItems: [
                    { eng: "Basketball", esp: "Baloncesto", ex: "I play basketball.", pr: "Basketbol" },
                    { eng: "Swimming", esp: "Natación", ex: "Swimming is fun.", pr: "Suiming" }
                ],
                explain: "<h2>Sports Vocabulary</h2><p>Usamos palabras específicas para hablar de lo que practicamos o de lo que no nos gusta jugar.</p>",
                examples: [
                    { eng: "I play football (+)", esp: "Yo juego fútbol." },
                    { eng: "I do not play tennis (-)", esp: "Yo no juego tenis." }
                ],
                questions: [
                    { type: "multiple-choice", question: "(+) ¿Qué deporte requiere una piscina para nadar?", options: ["Basketball", "Swimming", "Tennis"], correct: "Swimming", exp: "Swimming es natación." },
                    { type: "multiple-choice", question: "(-) Completa la forma negativa: 'I ______ play football.'", options: ["do not", "is not", "am not"], correct: "do not", exp: "Usamos 'do not' para negar verbos en presente con I." },
                    { type: "writing-validation", question: "Escribe en inglés: 'Yo juego tenis' (+)", accepted: ["I play tennis", "I play tennis."], exp: "Sujeto + Verbo + Complemento." },
                    { type: "multiple-choice", question: "(-) Si no juegas baloncesto dices: 'I do not play _________'", options: ["Basketball", "Running", "Swimming"], correct: "Basketball", exp: "Basketball significa baloncesto." },
                    { type: "writing-validation", question: "Completa la negación: 'I do ____ play tennis.'", accepted: ["not"], exp: "La partícula de negación es 'not'." },
                    { type: "multiple-choice", question: "(+) Deporte que se juega con una raqueta y una red:", options: ["Tennis", "Basketball", "Running"], correct: "Tennis", exp: "Tennis es tenis." },
                    { type: "drag-drop", question: "(+) Ordena la frase: 'Yo juego fútbol'", pool: ["football", "play", "I"], correctOrder: ["I", "play", "football"], exp: "El orden correcto es Sujeto + Verbo + Objeto." },
                    { type: "writing-validation", question: "(+) ¿Cómo se escribe 'Fútbol' en inglés?", accepted: ["football", "soccer"], exp: "Se puede decir football o soccer." },
                    { type: "multiple-choice", question: "(-) Elige la opción correcta para: 'Yo no nado.'", options: ["I do not swim", "I am not swim", "I no swim"], correct: "I do not swim", exp: "Usamos el auxiliar do not para negar acciones." },
                    { type: "listening-api", phraseToSpeak: "I play basketball", question: "(+) Escucha el audio y selecciona la opción correcta:", options: ["I play basketball", "I play football", "I do not play basketball"], correct: "I play basketball", exp: "Has escuchado la forma afirmativa." },
                    { type: "multiple-choice", question: "(+) Significado de 'Running':", options: ["Correr", "Nadar", "Saltar"], correct: "Correr", exp: "Running viene de la acción de correr." },
                    { type: "writing-validation", question: "(-) Completa: 'We ___ not play tennis.'", accepted: ["do"], exp: "Para 'We' el auxiliar negativo es 'do not'." },
                    { type: "drag-drop", question: "(-) Ordena: 'Yo no juego baloncesto.'", pool: ["basketball", "play", "not", "I", "do"], correctOrder: ["I", "do", "not", "play", "basketball"], exp: "Sujeto + do + not + verbo + complemento." },
                    { type: "multiple-choice", question: "(+) Si juegas voleibol dices: 'I play ______'", options: ["volleyball", "swimming", "tennis"], correct: "volleyball", exp: "Volleyball significa voleibol." },
                    { type: "listening-api", phraseToSpeak: "We do not swim", question: "(-) Escucha el audio y selecciona la opción correcta:", options: ["We do not swim", "We swim", "They do not swim"], correct: "We do not swim", exp: "Se niega con do not swim." },
                    { type: "writing-validation", question: "(+) Traduce la palabra 'Natación':", accepted: ["swimming"], exp: "Swimming se escribe con doble 'm'." },
                    { type: "multiple-choice", question: "(-) ¿Cuál está mal escrita?", options: ["I do not play football", "I no play basketball", "I do not swim"], correct: "I no play basketball", exp: "'I no play' es incorrecto en inglés formal." },
                    { type: "drag-drop", question: "(+) Ordena: 'Nosotros jugamos tenis.'", pool: ["tennis", "play", "We"], correctOrder: ["We", "play", "tennis"], exp: "We (Nosotros) + play (jugamos) + tennis." },
                    { type: "listening-api", phraseToSpeak: "I do not play soccer", question: "(-) Escucha el audio:", options: ["I do not play soccer", "I play soccer", "He plays soccer"], correct: "I do not play soccer", exp: "Estructura negativa clara." },

        /**
         * ENGINE MANAGER DE LA PLATAFORMA (LÓGICA MEJORADA DE ALEATORIEDAD)

        class EnglishAdventureApp {
            constructor() {
                this.currentLevel = 1;
                this.currentStep = 0; 
                this.currentQuestionIdx = 0; 
                this.teacherMode = true;
                
                this.progress = {
                    unlockedLevel: 1,
                    starsByLevel: {},
                    learnedVocabulary: []
                };

                this.selectedOption = null;
                this.activeQuestionsOrder = []; 
                this.mobileSelectedWords = [];
            }

            init() {
                this.loadProgressFromStorage();
                this.renderMapNodes();
                this.updateGlobalUIStats();
            }

            loadProgressFromStorage() {
                const data = localStorage.getItem('english_adventure_v2_multiq');
                if (data) {
                    try {
                        this.progress = JSON.parse(data);
                    } catch(e) { console.error(e); }
                }
            }

            saveProgressToStorage() {
                localStorage.setItem('english_adventure_v2_multiq', JSON.stringify(this.progress));
                this.updateGlobalUIStats();
            }

            resetProgress() {
                if(confirm("¿Deseas reiniciar todo tu progreso de juego?")) {
                    localStorage.removeItem('english_adventure_v2_multiq');
                    this.progress = { unlockedLevel: 1, starsByLevel: {}, learnedVocabulary: [] };
                    this.currentLevel = 1;
                    this.currentStep = 0;
                    this.saveProgressToStorage();
                    this.renderMapNodes();
                    this.switchTab('map');
                }
            }

            updateGlobalUIStats() {
                let stars = 0;
                Object.values(this.progress.starsByLevel).forEach(v => stars += v);
                document.getElementById('global-star-count').innerText = stars;
                document.getElementById('global-vocab-count').innerText = this.progress.learnedVocabulary.length;

                const pct = Math.min(100, Math.round(((this.progress.unlockedLevel - 1) / 10) * 100));
                document.getElementById('progress-percentage-text').innerText = `${pct}%`;
                document.getElementById('map-progress-bar').style.width = `${pct}%`;
            }

            renderMapNodes() {
                const target = document.getElementById('map-nodes-target');
                target.innerHTML = '';
                for (let i = 1; i <= 10; i++) {
                    const node = document.createElement('div');
                    node.className = 'level-node';
                    const isCompleted = i < this.progress.unlockedLevel;
                    const isUnlocked = i <= this.progress.unlockedLevel;

                    if (isCompleted) node.classList.add('completed');
                    else if (isUnlocked) node.classList.add('unlocked');

                    const sCount = this.progress.starsByLevel[i] || 0;
                    node.innerHTML = `
                        <div class="level-bubble" onclick="app.enterLevel(${i}, ${isUnlocked})">${isCompleted ? '✓' : i}</div>
                        <div class="level-info-box">
                            <div class="level-title">${CLASS_DATASET[i].title}</div>
                            <div class="level-stars">${"⭐".repeat(sCount) || "0 estrellas"}</div>
                        </div>
                    `;
                    target.appendChild(node);
                }
            }

            enterLevel(levelNum, isUnlocked) {
                if (!isUnlocked) {
                    alert("🔒 ¡Completa los niveles anteriores primero!");
                    return;
                }
                this.currentLevel = levelNum;
                this.currentStep = 0;
                this.currentQuestionIdx = 0;

                // EXCELENTE: Mezcla el set de 20 preguntas y corta las primeras 5 para la sesión de juego activa
                const fullPool = [...CLASS_DATASET[levelNum].questions];
                this.activeQuestionsOrder = fullPool.sort(() => Math.random() - 0.5).slice(0, 5);

                document.getElementById('view-map').classList.remove('active');
                document.getElementById('view-class').classList.add('active');
                document.getElementById('class-view-title').innerText = `Nivel ${levelNum}: ${CLASS_DATASET[levelNum].title}`;
                
                this.renderCurrentStepInFlow();
            }

            exitToMap() {
                document.getElementById('view-class').classList.remove('active');
                document.getElementById('view-map').classList.add('active');
                this.renderMapNodes();
                this.updateGlobalUIStats();
            }

                document.getElementById('dynamic-teacher-box').style.display = this.teacherMode ? 'flex' : 'none';
            }

                                <span style="font-size:50px;">🎉</span>
                                <h3 style="color:var(--primary-dark); margin-top:10px;">¡Ronda de Preguntas Superada!</h3>
                                <p style="margin-top:10px; color:#555;">Hiciste un trabajo impecable balanceando las formas del idioma.</p>
                            </div>`;
                        break;

                    case 4:
                        document.getElementById('teacher-speech-text').innerText = "Aquí tienes tu resumen final listo. Repásalo antes de volver al mapa.";
                        core.innerHTML = data.summary;
                        break;
                }
            }

            renderActiveQuestionSlot() {
                const core = document.getElementById('class-content-core');
                const q = this.activeQuestionsOrder[this.currentQuestionIdx];
                this.mobileSelectedWords = [];
                
                let html = `<div style="font-size:18px; font-weight:bold; margin-bottom:15px;">${q.question}</div>`;

                let trackerHTML = `<div class="subquestion-tracker">`;
                for(let i=0; i<5; i++) {
                    let stateClass = "";
                    if(i === this.currentQuestionIdx) stateClass = "current";
                    else if(i < this.currentQuestionIdx) stateClass = "correct";
                    trackerHTML += `<div class="sub-badge ${stateClass}">${i+1}</div>`;
                }
                trackerHTML += `</div>`;

                if (q.type === "multiple-choice" || q.type === "listening-api") {
                    if (q.type === "listening-api") {
                        html += `
                            <div style="text-align:center; margin:15px 0;">
                                <button class="btn btn-secondary" onclick="app.speakText('${q.phraseToSpeak}')" style="border-radius:50%; width:60px; height:60px; font-size:20px; padding:0;">🔊</button>
                            </div>`;
                    }
                    html += `<div class="options-grid">`;
                    q.options.forEach(opt => {
                        html += `<div class="option-card" onclick="app.selectOptionCard(this, '${opt}')">${opt}</div>`;
                    });
                    html += `</div>`;
                } 
                else if (q.type === "drag-drop") {
                    html += `<div class="drag-container" id="words-pool-container">`;
                    const mixedPool = [...q.pool].sort(() => Math.random() - 0.5);
                    mixedPool.forEach((w, idx) => {
                        html += `
                            <div class="drag-item" 
                                 draggable="true" 
                                 id="drg-${idx}" 
                                 onclick="app.handleWordClick(this, '${w}')"
                                 ondragstart="app.handleDragStart(event, '${w}', 'drg-${idx}')"
                                 ontouchstart="app.handleTouchStart(event, '${w}', 'drg-${idx}')">
                                 ${w}
                            </div>`;
                    });
                    html += `
                        </div>
                        <div class="drop-zone" id="drop-zone-target" 
                             ondragover="app.handleDragOver(event)" 
                             ondragleave="app.handleDragLeave(event)" 
                             ondrop="app.handleDrop(event)"
                             ontouchend="app.handleTouchEnd(event)">
                            Suelta las palabras aquí o tócalas...
                        </div>
                        <button class="btn btn-secondary" style="margin-top:10px; padding:4px 8px; font-size:11px;" onclick="app.clearDropZone()">Limpiar</button>
                    `;
                } 
                else if (q.type === "writing-validation") {
                    html += `<input type="text" class="text-input-field" id="writing-input-box" placeholder="Escribe tu respuesta aquí..." autocomplete="off">`;
                }

                core.innerHTML = html + trackerHTML;
            }

            selectOptionCard(el, val) {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                el.classList.add('selected');
                this.selectedOption = val;
            }

            handleWordClick(el, word) {
                if (el.classList.contains('used')) return;
                el.classList.add('used');
                this.mobileSelectedWords.push({ id: el.id, text: word });
                this.refreshMobileDropZone();
            }

            refreshMobileDropZone() {
                const zone = document.getElementById('drop-zone-target');
                if (this.mobileSelectedWords.length === 0) {
                    zone.innerHTML = "Suelta las palabras aquí o tócalas...";
                    return;
                }
                zone.innerHTML = "";
                this.mobileSelectedWords.forEach(item => {
                    const span = document.createElement('span');
                    span.className = 'drag-item';
                    span.innerText = item.text;
                    zone.appendChild(span);
                });
            }

            clearDropZone() {
                this.mobileSelectedWords = [];
                document.querySelectorAll('#words-pool-container .drag-item').forEach(item => {
                    item.classList.remove('used');
                });
                document.getElementById('drop-zone-target').innerHTML = "Suelta las palabras aquí o tócalas...";
            }

            handleDragStart(e, w, id) { 
                e.dataTransfer.setData("text/plain", w); 
                e.dataTransfer.setData("element-id", id);
            }
            
            handleDragOver(e) { 
                e.preventDefault(); 
                document.getElementById('drop-zone-target').classList.add('hover'); 
            }
            
            handleDragLeave(e) { 
                document.getElementById('drop-zone-target').classList.remove('hover'); 
            }
            
            handleDrop(e) {
                e.preventDefault();
                const zone = document.getElementById('drop-zone-target');
                zone.classList.remove('hover');
                
                const word = e.dataTransfer.getData("text/plain");
                const id = e.dataTransfer.getData("element-id");
                
                if (word && id) {
                    const originEl = document.getElementById(id);
                    if (originEl && !originEl.classList.contains('used')) {
                        originEl.classList.add('used');
                        this.mobileSelectedWords.push({ id: id, text: word });
                        this.refreshMobileDropZone();
                    }
                }
            }

            handleTouchStart(e, w, id) {
                this.activeTouchData = { text: w, id: id };
            }

            handleTouchEnd(e) {
                if (this.activeTouchData) {
                    const originEl = document.getElementById(this.activeTouchData.id);
                    if (originEl && !originEl.classList.contains('used')) {
                        originEl.classList.add('used');
                        this.mobileSelectedWords.push({ id: this.activeTouchData.id, text: this.activeTouchData.text });
                        this.refreshMobileDropZone();
                    }
                    this.activeTouchData = null;
                }
            }

            flowNext() {
                if (this.currentStep === 2) {
                    const q = this.activeQuestionsOrder[this.currentQuestionIdx];
                    let isCorrect = false;

                    if (q.type === "multiple-choice" || q.type === "listening-api") {
                        if (!this.selectedOption) { alert("¡Selecciona una opción!"); return; }
                        isCorrect = (this.selectedOption === q.correct);
                    } 
                    else if (q.type === "drag-drop") {
                        const res = this.mobileSelectedWords.map(item => item.text.trim());
                        isCorrect = (JSON.stringify(res) === JSON.stringify(q.correctOrder));
                    } 
                    else if (q.type === "writing-validation") {
                        const txt = document.getElementById('writing-input-box').value.trim().toLowerCase();
                        isCorrect = q.accepted.some(ans => ans.toLowerCase() === txt.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,""));
                    }

                    const panel = document.getElementById('action-feedback-panel');
                    const mainMsg = document.getElementById('feedback-main-message');
                    const expMsg = document.getElementById('feedback-explanation-text');

                    if (isCorrect) {
                        panel.className = "feedback-panel correct";
                        mainMsg.innerText = "¡Excelente! Respuesta Correcta ⭐";
                        expMsg.innerText = q.exp;
                        
                        setTimeout(() => {
                            panel.className = "feedback-panel";
                            if (this.currentQuestionIdx < 4) {
                                this.currentQuestionIdx++;
                                this.renderActiveQuestionSlot();
                            } else {
                                this.currentStep = 3; 
                                this.renderCurrentStepInFlow();
                            }
                        }, 1800);

                    } else {
                        panel.className = "feedback-panel wrong";
                        mainMsg.innerText = "¡Inténtalo de nuevo!";
                        expMsg.innerText = "Analiza bien la estructura afirmativa o la partícula negativa requerida.";
                    }
                    return;
                }

                if (this.currentStep < 4) {
                    this.currentStep++;
                    this.renderCurrentStepInFlow();
                } else {
                    this.finalizeLevelCompletion();
                }
            }

            flowPrevious() {
                if (this.currentStep > 0) {
                    if(this.currentStep === 2) this.currentQuestionIdx = 0;
                    this.currentStep--;
                    this.renderCurrentStepInFlow();
                }
            }

            finalizeLevelCompletion() {
                const levelData = CLASS_DATASET[this.currentLevel];
                levelData.vocabItems.forEach(item => {
                    if (!this.progress.learnedVocabulary.some(v => v.eng.toLowerCase() === item.eng.toLowerCase())) {
                        this.progress.learnedVocabulary.push(item);
                    }
                });

                this.progress.starsByLevel[this.currentLevel] = 3;

                if (this.currentLevel === this.progress.unlockedLevel && this.progress.unlockedLevel < 10) {
                    this.progress.unlockedLevel = this.currentLevel + 1;
                } else if (this.currentLevel === 10) {
                    this.saveProgressToStorage();
                    this.exitToMap();
                    this.switchTab('final');
                    return;
                }

                this.saveProgressToStorage();
                this.exitToMap();
            }

            switchTab(tab) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));

                if (tab === 'map') {
                    document.getElementById('view-map').classList.add('active');
                    document.getElementById('tab-map').classList.add('active');
                    this.renderMapNodes();
                } else if (tab === 'vocab') {
                    document.getElementById('view-vocabulary').classList.add('active');
                    document.getElementById('tab-vocab').classList.add('active');
                    this.renderVocabularyGrid();
                } else if (tab === 'final') {
                    document.getElementById('view-final').classList.add('active');
                }
            }

            renderVocabularyGrid() {
                const grid = document.getElementById('vocab-cards-grid');
                grid.innerHTML = '';
                if (this.progress.learnedVocabulary.length === 0) {
                    grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:#888;">Completa clases para recolectar palabras.</div>`;
                    return;
                }
                this.progress.learnedVocabulary.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'vocab-card';
                    card.innerHTML = `
                        <div class="vocab-meta">
                            <h4>${item.eng} <span style="font-size:12px; color:#888;">[${item.pr}]</span></h4>
                            <div style="color:#555;">🗣️ ${item.esp}</div>
                            <div style="font-size:12px; font-style:italic; color:#888;">${item.ex}</div>
                        </div>
                        <div class="audio-icon-btn" onclick="app.speakText('${item.eng.replace(/'/g, "\\'")}')">🔊</div>`;
                    grid.appendChild(card);
                });
            }

            downloadVocabularyJSON() {
                if(this.progress.learnedVocabulary.length === 0) return;
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.progress.learnedVocabulary, null, 2));
                const dl = document.createElement('a');
                dl.setAttribute("href", dataStr);
                dl.setAttribute("download", "vocabulary.json");
                dl.click();
            }

            speakText(text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const u = new SpeechSynthesisUtterance(text);
                    u.lang = 'en-US';
                    u.rate = 0.85;
                    window.speechSynthesis.speak(u);
                }
            }
        }

        const app = new EnglishAdventureApp();
        window.addEventListener('DOMContentLoaded', () => app.init());
        // ==========================================
// SISTEMA DE PERSISTENCIA Y REINICIO DE CURSO
// ==========================================
document.addEventListener("DOMContentLoaded", () => {
    // 1. Crear el botón dinámicamente para no alterar tu HTML manual
    const btnReiniciar = document.createElement('button');
    btnReiniciar.id = 'btn-reiniciar-curso';
    btnReiniciar.innerText = 'Reiniciar Curso y Progreso';
    
    // Estilos para que se adapte elegantemente a la interfaz
    Object.assign(btnReiniciar.style, {
        display: 'none',
        marginTop: '20px',
        padding: '12px 24px',
        backgroundColor: '#d32f2f',
        color: '#ffffff',
        border: 'none',
        borderRadius: '6px',
        fontSize: '16px',
        fontWeight: 'bold',
        cursor: 'pointer',
        boxShadow: '0px 4px 6px rgba(0,0,0,0.1)',
        transition: 'background-color 0.2s'
    });

    btnReiniciar.onmouseover = () => btnReiniciar.style.backgroundColor = '#f44336';
    btnReiniciar.onmouseout = () => btnReiniciar.style.backgroundColor = '#d32f2f';

    // 2. Insertar el botón automáticamente en el contenedor principal o al final del body
    // Intenta buscar tu contenedor del diploma o se añade al final de la app
    const contenedorApp = document.getElementById('contenedor-diploma') || document.body;
    contenedorApp.appendChild(btnReiniciar);

    // 3. Verificar si el curso ya estaba completado de forma persistente
    if (localStorage.getItem('cursoCompletado') === 'true') {
        btnReiniciar.style.display = 'block';
    }

    // 4. Escuchar el evento de cuando el usuario obtiene el diploma
    // Interceptamos de forma segura sin alterar tus funciones originales
    const originalMostrarDiploma = window.mostrarDiploma; 
    if (typeof originalMostrarDiploma === 'function') {
        window.mostrarDiploma = function(...args) {
            localStorage.setItem('cursoCompletado', 'true');
            btnReiniciar.style.display = 'block';
            return originalMostrarDiploma.apply(this, args);
        };
    } else {
        // Si tu función final tiene otro nombre (ej. finalizarCurso), puedes llamarla aquí
        // O si ya funciona de forma nativa, el paso 3 asegura el comportamiento al recargar.
    }

    // 5. Lógica del botón de reinicio
    btnReiniciar.addEventListener('click', () => {
        if (confirm("¿Estás seguro de que deseas reiniciar todo tu progreso desde cero?")) {
            // Limpiamos los registros del navegador
            localStorage.removeItem('cursoCompletado');
            
            // Si manejas almacenamiento de progreso pregunta por pregunta, límpialos aquí:
            localStorage.removeItem('progresoActual'); 
            localStorage.removeItem('respuestasCorrectas');

            // Ocultamos el botón y recargamos la app limpia
            btnReiniciar.style.display = 'none';
            location.reload();
        }
    });
});
    </script>
