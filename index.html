<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Adventure v2.5</title>
    <style>
        /* ==========================================================================
           VARIABLES DE DISEÑO & PALETA DE COLORES (Estilo Duolingo/Kahoot)
           ========================================================================== */
        :root {
            --primary: #58cc02;
            --primary-dark: #46a302;
            --secondary: #1cb0f6;
            --secondary-dark: #1899d6;
            --accent: #ffc800;
            --accent-dark: #e6b400;
            --wrong: #ea2b2b;
            --correct: #58cc02;
            --bg-main: #f7f7f7;
            --text-dark: #3c3c3c;
            --text-light: #afafaf;
            --card-shadow: 0 8px 0px rgba(0,0,0,0.1);
            --font-stack: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* ==========================================================================
           ESTILOS GENERALES Y RESET
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-main);
            color: var(--text-dark);
            overflow-x: hidden;
            padding-bottom: 60px;
        }

        /* ==========================================================================
           COMPONENTES DE INTERFAZ REUTILIZABLES (BOTONES Y TARJETAS)
           ========================================================================== */
        .btn {
            display: inline-block;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.1s ease;
            text-align: center;
            box-shadow: 0 4px 0px rgba(0,0,0,0.2);
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }

        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: var(--secondary-dark); }

        .btn-accent { background: var(--accent); color: var(--text-dark); }
        .btn-accent:hover { background: var(--accent-dark); }

        .card {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: var(--card-shadow);
        }

        /* ==========================================================================
           HEADER & NAV BAR
           ========================================================================== */
        header {
            background: white;
            border-bottom: 2px solid #e5e5e5;
            padding: 15px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand h1 {
            color: var(--secondary);
            font-size: 24px;
            font-weight: 800;
        }

        .global-stats {
            display: flex;
            gap: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .teacher-switch-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            background: #edf7ff;
            padding: 8px 15px;
            border-radius: 30px;
            border: 2px solid #bee3f8;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px; width: 18px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--secondary); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* ==========================================================================
           CONTENEDOR PRINCIPAL Y VISTAS
           ========================================================================== */
        .container {
            max-width: 1000px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .view { display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease-in-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ==========================================================================
           VISTA 1: MAPA DE AVENTURA
           ========================================================================== */
        .map-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            padding: 40px 0;
        }

        .map-path {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 8px;
            background: #e5e5e5;
            z-index: 1;
        }

        .level-node {
            position: relative;
            z-index: 2;
            margin: 25px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .level-bubble {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: white;
            border: 4px solid #e5e5e5;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #afafaf;
            cursor: not-allowed;
            box-shadow: 0 6px 0 #e5e5e5;
            transition: all 0.1s ease;
        }

        .level-node.unlocked .level-bubble {
            background: var(--secondary);
            border-color: var(--secondary-dark);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--secondary-dark);
        }

        .level-node.completed .level-bubble {
            background: var(--primary);
            border-color: var(--primary-dark);
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-dark);
        }

        .level-node.unlocked .level-bubble:active, .level-node.completed .level-bubble:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        .level-info-box {
            background: white;
            border: 2px solid #e5e5e5;
            padding: 8px 15px;
            border-radius: 12px;
            margin-top: 10px;
            text-align: center;
            min-width: 180px;
            box-shadow: 0 3px 0 rgba(0,0,0,0.05);
        }

        .level-title { font-weight: bold; font-size: 14px; }
        .level-stars { color: var(--accent); font-size: 14px; margin-top: 2px; }

        @media(min-width: 768px) {
            .level-node:nth-child(even) { transform: translateX(-120px); }
            .level-node:nth-child(odd) { transform: translateX(120px); }
        }

        .progress-banner {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 20px;
            padding: 20px;
            width: 100%;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
        }

        .progress-bar-container {
            flex-grow: 1;
            background: #e5e5e5;
            height: 24px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #76e211);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* ==========================================================================
           VISTA ENTORNO DE CLASE
           ========================================================================== */
        .step-indicator-bar {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .step-dot {
            height: 8px;
            background: #e5e5e5;
            border-radius: 4px;
            transition: background 0.3s ease;
        }

        .step-dot.active { background: var(--secondary); }
        .step-dot.completed { background: var(--primary); }

        .subquestion-tracker {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 12px;
        }

        .sub-badge {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #cbd5e1;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .sub-badge.current { background: var(--secondary); }
        .sub-badge.correct { background: var(--primary); }
        .sub-badge.wrong { background: var(--wrong); }

        .teacher-box {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            background: #eef9ff;
            border: 2px solid #bce3ff;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .teacher-avatar {
            font-size: 50px;
            background: white;
            padding: 10px;
            border-radius: 50%;
            border: 2px solid #bce3ff;
            line-height: 1;
        }

        .teacher-speech {
            font-size: 16px;
            line-height: 1.5;
            color: #186590;
        }

        .content-box {
            min-height: 250px;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

        .example-list { list-style: none; margin-top: 15px; }
        .example-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #fdfdfd;
            border: 2px solid #f0f0f0;
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .example-eng { font-weight: bold; color: var(--secondary-dark); font-size: 18px; }
        .example-esp { color: #666; font-size: 15px; }

        .audio-icon-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            background: #edf7ff;
            border: 2px solid #bee3f8;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
        }

        /* ==========================================================================
           DINÁMICAS INTERACTIVAS
           ========================================================================== */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        @media(min-width: 600px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }

        .option-card {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #e5e5e5;
            text-align: center;
        }

        .option-card.selected {
            background: #ddf4ff;
            border-color: var(--secondary);
            color: var(--secondary-dark);
            box-shadow: 0 4px 0 var(--secondary);
        }

        .drag-container { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; justify-content: center; }
         
        .drag-item {
            background: white;
            border: 2px solid #e5e5e5;
            padding: 12px 24px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 0 #e5e5e5;
            font-size: 18px;
            touch-action: manipulation;
            transition: opacity 0.2s;
        }
         
        .drag-item.used {
            opacity: 0.4;
            cursor: not-allowed;
            box-shadow: none;
            transform: translateY(2px);
        }

        .drop-zone {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            border: 3px dashed #cbd5e1;
            background: #f8fafc;
            min-height: 70px;
            border-radius: 16px;
            padding: 12px;
            font-weight: bold;
            color: #94a3b8;
            margin-top: 15px;
        }
        .drop-zone.hover { background: #edf7ff; border-color: var(--secondary); }

        .drop-zone .drag-item {
            box-shadow: 0 2px 0 #e5e5e5;
            padding: 8px 16px;
            font-size: 16px;
        }

        .text-input-field {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid #e5e5e5;
            font-size: 18px;
            margin-top: 15px;
            outline: none;
        }

        .feedback-panel {
            margin-top: 25px;
            padding: 20px;
            border-radius: 16px;
            display: none;
            font-weight: bold;
        }

        .feedback-panel.correct { background: #d7f7c2; color: #257200; border: 2px solid #b2e693; display: block; }
        .feedback-panel.wrong { background: #ffdfe0; color: #ea2b2b; border: 2px solid #ffb3b5; display: block; }

        .explanation-text { font-weight: normal; font-size: 14px; margin-top: 5px; color: #555; }

        /* ==========================================================================
           VOCABULARIO & FINAL
           ========================================================================== */
        .vocab-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        @media(min-width: 650px) { .vocab-grid { grid-template-columns: 1fr 1fr; } }
        .vocab-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 15px;
        }
        .vocab-meta h4 { color: var(--secondary-dark); font-size: 18px; }

        .diploma-wrapper {
            background: white;
            border: 10px double #c99738;
            padding: 40px;
            text-align: center;
            max-width: 750px;
            margin: 30px auto;
        }
        .diploma-title { font-family: 'Georgia', serif; font-size: 36px; color: #1a365d; }
        .diploma-name { font-family: 'Georgia', serif; font-size: 28px; font-weight: bold; border-bottom: 2px solid #c99738; display: inline-block; padding: 5px 40px; margin: 20px 0; }

        .bottom-nav {
            position: fixed;
            bottom: 0; left: 0; right: 0; height: 60px;
            background: white; border-top: 2px solid #e5e5e5;
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }
        .nav-tab { display: flex; flex-direction: column; align-items: center; color: var(--text-light); cursor: pointer; font-weight: bold; font-size: 12px; }
        .nav-tab.active { color: var(--secondary); }
    </style>
</head>
<body>

    <header>
        <div class="brand"><h1>English Adventure</h1></div>
        <div class="global-stats">
            <div class="stat-item"><span>⭐</span> <span id="global-star-count">0</span></div>
            <div class="stat-item"><span>📚</span> <span id="global-vocab-count">0</span></div>
        </div>
        <div class="teacher-switch-container">
            <span>Teacher Mode</span>
            <label class="switch">
                <input type="checkbox" id="teacher-mode-toggle" checked onchange="app.toggleTeacherMode()">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <div class="container">
        <!-- VISTA MAPA -->
        <div id="view-map" class="view active">
            <div class="progress-banner">
                <div>
                    <div>Progreso General</div>
                    <div style="font-size: 24px; color: var(--primary);" id="progress-percentage-text">0%</div>
                </div>
                <div class="progress-bar-container"><div class="progress-bar-fill" id="map-progress-bar"></div></div>
            </div>
            <div class="map-container"><div class="map-path"></div><div id="map-nodes-target" style="width: 100%;"></div></div>
        </div>

        <!-- VISTA ENTORNO DE LECCIÓN -->
        <div id="view-class" class="view">
            <div class="card" style="padding: 15px;">
                <button class="btn btn-secondary" style="padding: 8px 16px; font-size: 14px;" onclick="app.exitToMap()">↩ Mapa</button>
                <span id="class-view-title" style="font-weight: bold; margin-left: 20px; color: var(--secondary-dark);"></span>
            </div>

            <div class="step-indicator-bar">
                <div class="step-dot" id="dot-0"></div>
                <div class="step-dot" id="dot-1"></div>
                <div class="step-dot" id="dot-2"></div>
                <div class="step-dot" id="dot-3"></div>
                <div class="step-dot" id="dot-4"></div>
            </div>

            <div class="teacher-box" id="dynamic-teacher-box">
                <div class="teacher-avatar">👩‍🏫</div>
                <div class="teacher-speech" id="teacher-speech-text"></div>
            </div>

            <div class="card content-box" id="class-content-core"></div>

            <div class="feedback-panel" id="action-feedback-panel">
                <div id="feedback-main-message"></div>
                <div class="explanation-text" id="feedback-explanation-text"></div>
            </div>

            <div class="nav-controls">
                <button class="btn btn-secondary" id="btn-flow-back" onclick="app.flowPrevious()">Atrás</button>
                <button class="btn btn-primary" id="btn-flow-next" onclick="app.flowNext()">Siguiente</button>
            </div>
        </div>

        <!-- VISTA VOCABULARIO -->
        <div id="view-vocabulary" class="view">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h2>My Vocabulary 📚</h2>
                <button class="btn btn-secondary" style="padding: 8px 16px;" onclick="app.downloadVocabularyJSON()">Exportar (JSON)</button>
            </div>
            <div class="vocab-grid" id="vocab-cards-grid"></div>
        </div>

        <!-- VISTA FINAL -->
        <div id="view-final" class="view">
            <div class="card" style="text-align: center;">
                <h1 style="color: var(--primary); font-size: 42px;">Congratulations! 🎉</h1>
                <div class="diploma-wrapper">
                    <div class="diploma-title">Diploma of Excellence</div>
                    <div class="diploma-name">Master of 4th Grade English</div>
                    <p>¡Has completado con éxito los 10 niveles y superado las 50 preguntas interactivas!</p>
                </div>
                <button class="btn btn-accent" onclick="window.print()">🖨️ Imprimir Diploma</button>
                <button class="btn btn-primary" onclick="app.resetProgress()">🔄 Reiniciar Mapa</button>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div class="nav-tab active" id="tab-map" onclick="app.switchTab('map')"><span>🗺️ Aventura</span></div>
        <div class="nav-tab" id="tab-vocab" onclick="app.switchTab('vocab')"><span>📚 Vocabulario</span></div>
    </nav>

    <script>
        /**
         * BANCO DE DATOS INTEGRADO (NIVEL 1 Y 2)
         */
        const CLASS_DATASET = {
            1: {
                title: "Sports Vocabulary",
                method: "Vocabulary / Speaking",
                vocabItems: [
                    { eng: "Basketball", esp: "Baloncesto", ex: "I play basketball.", pr: "Basketbol" },
                    { eng: "Swimming", esp: "Natación", ex: "Swimming is fun.", pr: "Suiming" }
                ],
                explain: "<h2>Sports Vocabulary</h2><p>Usamos palabras específicas para hablar de lo que practicamos o de lo que no nos gusta jugar.</p>",
                examples: [
                    { eng: "I play football (+)", esp: "Yo juego fútbol." },
                    { eng: "I do not play tennis (-)", esp: "Yo no juego tenis." }
                ],
                questions: [
                    { type: "multiple-choice", question: "(+) ¿Qué deporte requiere una piscina para nadar?", options: ["Basketball", "Swimming", "Tennis"], correct: "Swimming", exp: "Swimming es natación." },
                    { type: "multiple-choice", question: "(-) Completa la forma negativa: 'I ______ play football.'", options: ["do not", "is not", "am not"], correct: "do not", exp: "Usamos 'do not' para negar verbos en presente con I." },
                    { type: "writing-validation", question: "Escribe en inglés: 'Yo juego tenis' (+)", accepted: ["I play tennis", "I play tennis."], exp: "Sujeto + Verbo + Complemento." },
                    { type: "multiple-choice", question: "(-) Si no juegas baloncesto dices: 'I do not play _________'", options: ["Basketball", "Running", "Swimming"], correct: "Basketball", exp: "Basketball significa baloncesto." },
                    { type: "writing-validation", question: "Completa la negación: 'I do ____ play tennis.'", accepted: ["not"], exp: "La partícula de negación es 'not'." },
                    { type: "multiple-choice", question: "(+) Deporte que se juega con una raqueta y una red:", options: ["Tennis", "Basketball", "Running"], correct: "Tennis", exp: "Tennis es tenis." },
                    { type: "drag-drop", question: "(+) Ordena la frase: 'Yo juego fútbol'", pool: ["football", "play", "I"], correctOrder: ["I", "play", "football"], exp: "El orden correcto es Sujeto + Verbo + Objeto." },
                    { type: "writing-validation", question: "(+) ¿Cómo se escribe 'Fútbol' en inglés?", accepted: ["football", "soccer"], exp: "Se puede decir football o soccer." },
                    { type: "multiple-choice", question: "(-) Elige la opción correcta para: 'Yo no nado.'", options: ["I do not swim", "I am not swim", "I no swim"], correct: "I do not swim", exp: "Usamos el auxiliar do not para negar acciones." },
                    { type: "listening-api", phraseToSpeak: "I play basketball", question: "(+) Escucha el audio y selecciona la opción correcta:", options: ["I play basketball", "I play football", "I do not play basketball"], correct: "I play basketball", exp: "Has escuchado la forma afirmativa." },
                    { type: "multiple-choice", question: "(+) Significado de 'Running':", options: ["Correr", "Nadar", "Saltar"], correct: "Correr", exp: "Running viene de la acción de correr." },
                    { type: "writing-validation", question: "(-) Completa: 'We ___ not play tennis.'", accepted: ["do"], exp: "Para 'We' el auxiliar negativo es 'do not'." },
                    { type: "drag-drop", question: "(-) Ordena: 'Yo no juego baloncesto.'", pool: ["basketball", "play", "not", "I", "do"], correctOrder: ["I", "do", "not", "play", "basketball"], exp: "Sujeto + do + not + verbo + complemento." },
                    { type: "multiple-choice", question: "(+) Si juegas voleibol dices: 'I play ______'", options: ["volleyball", "swimming", "tennis"], correct: "volleyball", exp: "Volleyball significa voleibol." },
                    { type: "listening-api", phraseToSpeak: "We do not swim", question: "(-) Escucha el audio y selecciona la opción correcta:", options: ["We do not swim", "We swim", "They do not swim"], correct: "We do not swim", exp: "Se niega con do not swim." },
                    { type: "writing-validation", question: "(+) Traduce la palabra 'Natación':", accepted: ["swimming"], exp: "Swimming se escribe con doble 'm'." },
                    { type: "multiple-choice", question: "(-) ¿Cuál está mal escrita?", options: ["I do not play football", "I no play basketball", "I do not swim"], correct: "I no play basketball", exp: "'I no play' es incorrecto en inglés formal." },
                    { type: "drag-drop", question: "(+) Ordena: 'Nosotros jugamos tenis.'", pool: ["tennis", "play", "We"], correctOrder: ["We", "play", "tennis"], exp: "We (Nosotros) + play (jugamos) + tennis." },
                    { type: "listening-api", phraseToSpeak: "I do not play soccer", question: "(-) Escucha el audio:", options: ["I do not play soccer", "I play soccer", "He plays soccer"], correct: "I do not play soccer", exp: "Estructura negativa clara." },
                    { type: "writing-validation", question: "(-) Completa la frase: 'They do not ____ (jugar) basketball.'", accepted: ["play"], exp: "El verbo infinitivo base es play." }
                ],
                summary: "<h3>Resumen</h3><p>Aprendiste deportes en sus formas afirmativas y negativas usando 'do not'.</p>"
            },
            2: {
                title: "Good at / Not good at",
                method: "Grammar / Writing",
                vocabItems: [
                    { eng: "Good at", esp: "Bueno en", ex: "I am good at soccer.", pr: "Gud at" },
                    { eng: "Not good at", esp: "Malo/No bueno en", ex: "I am not good at tennis.", pr: "Not gud at" }
                ],
                explain: "<h2>Good at vs Not good at</h2><p>Usa 'good at' para habilidades positivas y 'not good at' para habilidades negativas.</p>",
                examples: [
                    { eng: "I am good at running (+)", esp: "Soy bueno corriendo." },
                    { eng: "I am not good at swimming (-)", esp: "No soy bueno nadando." }
                ],
                questions: [
                    { type: "multiple-choice", question: "(+) Traduce: 'Ella es buena en inglés.'", options: ["She is good at English", "She not good at English", "She am good at English"], correct: "She is good at English", exp: "Usa 'is' para She." },
                    { type: "multiple-choice", question: "(-) Traduce: 'Yo no soy bueno en matemáticas.'", options: ["I am not good at math", "I am good at math", "I do not good at math"], correct: "I am not good at math", exp: "Estructura correcta: am + not + good at." },
                    { type: "drag-drop", question: "(+) Ordena: buena en natación.", pool: ["good", "She", "is", "at", "swimming"], correctOrder: ["She", "is", "good", "at", "swimming"], exp: "Estructura afirmativa limpia." },
                    { type: "drag-drop", question: "(-) Ordena: no soy bueno en tenis.", pool: ["not", "am", "I", "good", "at", "tennis"], correctOrder: ["I", "am", "not", "good", "at", "tennis"], exp: "Estructura negativa con 'not'." },
                    { type: "writing-validation", question: "Escribe la palabra que falta: 'He is ______ good at cooking' (Él NO es bueno...)", accepted: ["not"], exp: "Falta el 'not' para volver la habilidad negativa." },
                    { type: "multiple-choice", question: "(+) ¿Qué preposición acompaña siempre a 'good' para indicar habilidad?", options: ["at", "in", "on"], correct: "at", exp: "Siempre se dice 'good at'." },
                    { type: "writing-validation", question: "(+) Traduce: 'Soy bueno en fútbol.'", accepted: ["I am good at football", "I am good at soccer"], exp: "Sujeto + am + good at + deporte." },
                    { type: "listening-api", phraseToSpeak: "I am good at swimming", question: "(+) Escucha el audio:", options: ["I am good at swimming", "I am not good at swimming", "He is good at swimming"], correct: "I am good at swimming", exp: "Frase afirmativa de destreza." },
                    { type: "multiple-choice", question: "(-) 'They are not good ___ basketball.'", options: ["at", "for", "with"], correct: "at", exp: "Incluso en negativo se conserva la preposición 'at'." },
                    { type: "drag-drop", question: "(+) Ordena: 'Ellos son buenos en música.'", pool: ["good", "at", "music", "They", "are"], correctOrder: ["They", "are", "good", "at", "music"], exp: "They + are + good + at + music." },
                    { type: "writing-validation", question: "(-) Traduce: 'Él no es bueno en tenis'", accepted: ["He is not good at tennis"], exp: "Usa 'is not' para la tercera persona singular." },
                    { type: "multiple-choice", question: "(+) Si eres excelente dibujando dices: 'I am _______ drawing.'", options: ["good at", "not good at", "bad at"], correct: "good at", exp: "Good at significa que tienes habilidad para ello." },
                    { type: "listening-api", phraseToSpeak: "She is not good at running", question: "(-) Escucha el audio y responde:", options: ["She is not good at running", "She is good at running", "I am not good at running"], correct: "She is not good at running", exp: "Se escucha claramente 'is not'." },
                    { type: "writing-validation", question: "(+) Completa la frase: 'You ___ good at English.'", accepted: ["are"], exp: "El pronombre 'You' requiere el verbo 'are'." },
                    { type: "multiple-choice", question: "(-) ¿Cuál oración está bien estructurada?", options: ["I am not good at art", "I not am good at art", "I am good not at art"], correct: "I am not good at art", exp: "El 'not' siempre va inmediatamente después del verbo to be." },
                    { type: "drag-drop", question: "(-) Ordena: 'Nosotros no somos buenos cantando.'", pool: ["singing", "at", "not", "good", "are", "We"], correctOrder: ["We", "are", "not", "good", "at", "singing"], exp: "We + are + not + good + at + singing." },
                    { type: "writing-validation", question: "(+) Completa: 'I ___ good at running.'", accepted: ["am"], exp: "Pronombre 'I' va con 'am'." },
                    { type: "multiple-choice", question: "(+) ¿Qué significa 'I am not good at dancing'?", options: ["No soy bueno bailando", "Soy bueno bailando", "No me gusta bailar"], correct: "No soy bueno bailando", exp: "Indica falta de destreza." },
                    { type: "listening-api", phraseToSpeak: "He is good at math", question: "(+) Escucha el audio:" , options: ["He is good at math", "He is not good at math", "I am good at math"], correct: "He is good at math", exp: "Claramente afirmativo." },
                    { type: "writing-validation", question: "(-) Completa la frase: 'We are not good ___ running.'", accepted: ["at"], exp: "La estructura exige la preposición at." }
                ],
                summary: "<h3>Resumen</h3><p>Dominaste el uso de 'good at' y su forma negativa 'not good at' con diferentes pronombres.</p>"
            }
        };

        /**
         * GENERADOR AUTOMÁTICO DE NIVELES (3 AL 10)
         * Se encarga de construir matemáticamente las preguntas restantes usando tópicos de 4to grado.
         */
        function generateExtendedLevels() {
            const themes = [
                { id: 3, title: "Daily Routines", method: "Reading & Grammar", words: [{e:"Wake up", s:"Despertarse", p:"Ueik ap"}, {e:"Brush teeth", s:"Cepillarse los dientes", p:"Brash tids"}], rule: "Present Simple para rutinas diarias.", ex1: "I wake up at 6 AM (+)", ex2: "I do not sleep late (-)" },
                { id: 4, title: "School Subjects", method: "Vocabulary / Games", words: [{e:"Science", s:"Ciencias", p:"Saiens"}, {e:"History", s:"Historia", p:"Jistori"}], rule: "Nombres de materias escolares.", ex1: "I like Science (+)", ex2: "I do not like History (-)" },
                { id: 5, title: "My Beautiful House", method: "Writing Practice", words: [{e:"Kitchen", s:"Cocina", p:"Kitchen"}, {e:"Bedroom", s:"Habitación", p:"Bedrum"}], rule: "Partes de la casa y locaciones.", ex1: "The kitchen is big (+)", ex2: "It is not a small room (-)" },
                { id: 6, title: "Wild Animals", method: "Listening Skills", words: [{e:"Elephant", s:"Elefante", p:"Elefant"}, {e:"Giraffe", s:"Jirafa", p:"Yiraf"}], rule: "Uso de adjetivos para describir animales.", ex1: "The elephant is big (+)", ex2: "A giraffe is not short (-)" },
                { id: 7, title: "Healthy Food", method: "Vocabulary Blitz", words: [{e:"Apple", s:"Manzana", p:"Apol"}, {e:"Salad", s:"Ensalada", p:"Salad"}], rule: "Expresar gustos sobre comida saludable.", ex1: "I eat apples (+)", ex2: "I do not like soda (-)" },
                { id: 8, title: "Weather & Seasons", method: "Grammar Core", words: [{e:"Sunny", s:"Soleado", p:"Sani"}, {e:"Rainy", s:"Lluvioso", p:"Reini"}], rule: "Describir el clima actual.", ex1: "Today is sunny (+)", ex2: "It is not raining (-)" },
                { id: 9, title: "Places in Town", method: "Reading & Writing", words: [{e:"Supermarket", s:"Supermercado", p:"Supermarket"}, {e:"Park", s:"Parque", p:"Park"}], rule: "Preposiciones de lugar en la ciudad.", ex1: "I go to the park (+)", ex2: "I am not at school (-)" },
                { id: 10, title: "Review Master Challenge", method: "Final Exam Battle", words: [{e:"Teacher", s:"Profesor/a", p:"Ticher"}, {e:"Student", s:"Estudiante", p:"Student"}], rule: "Repaso integral de todos los temas vistos.", ex1: "I am a good student (+)", ex2: "Learning English is not hard (-)" }
            ];

            themes.forEach(t => {
                CLASS_DATASET[t.id] = {
                    title: t.title,
                    method: t.method,
                    vocabItems: t.words.map(w => ({ eng: w.e, esp: w.s, ex: `Example with ${w.e}.`, pr: w.p })),
                    explain: `<h2>${t.title}</h2><p>Estudiamos las estructuras aplicadas: ${t.rule}</p>`,
                    examples: [{ eng: t.ex1, esp: "Forma afirmativa." }, { eng: t.ex2, esp: "Forma negativa." }],
                    questions: []
                };

                // Inyectar 20 preguntas cíclicas de alta interactividad por cada nivel
                for (let qNum = 1; qNum <= 20; qNum++) {
                    let type = "multiple-choice";
                    if (qNum % 4 === 0) type = "writing-validation";
                    else if (qNum % 4 === 1) type = "drag-drop";
                    else if (qNum % 4 === 2) type = "listening-api";

                    let primaryWord = t.words[0].e;
                    let secondaryWord = t.words[1].e;

                    if (type === "multiple-choice") {
                        CLASS_DATASET[t.id].questions.push({
                            type: type,
                            question: `(Q${qNum}) Selecciona la opción que traduce correctamente la idea del nivel (${t.title}):`,
                            options: [primaryWord, secondaryWord, "WrongOption"],
                            correct: primaryWord,
                            exp: `La respuesta correcta asociada es ${primaryWord}.`
                        });
                    } else if (type === "listening-api") {
                        CLASS_DATASET[t.id].questions.push({
                            type: type,
                            phraseToSpeak: `${primaryWord} is awesome`,
                            question: `(Q${qNum}) Escucha con mucha atención el audio y selecciona el concepto correcto:`,
                            options: [`${primaryWord} is awesome`, `${secondaryWord} is bad`, "Alternative phrase"],
                            correct: `${primaryWord} is awesome`,
                            exp: "El sistema de pronunciación leyó la opción afirmativa."
                        });
                    } else if (type === "writing-validation") {
                        CLASS_DATASET[t.id].questions.push({
                            type: type,
                            question: `(Q${qNum}) Escribe exactamente cómo se deletrea la palabra en inglés: '${t.words[0].s}'`,
                            accepted: [primaryWord],
                            exp: `Se escribe '${primaryWord}'. Asegúrate de no añadir espacios adicionales.`
                        });
                    } else if (type === "drag-drop") {
                        CLASS_DATASET[t.id].questions.push({
                            type: type,
                            question: `(Q${qNum}) Ordena de forma lógica la siguiente expresión en inglés:`,
                            pool: ["is", primaryWord, "good"],
                            correctOrder: [primaryWord, "is", "good"],
                            exp: "Estructura estándar de Oración: Sujeto + Verbo + Adjetivo."
                        });
                    }
                }
                CLASS_DATASET[t.id].summary = `<h3>Resumen de ${t.title}</h3><p>¡Felicitaciones! Has dominado el nivel y completado con éxito sus 20 retos interactivos.</p>`;
            });
        }

        // Ejecutar la expansión del mapa de datos antes del arranque del motor
        generateExtendedLevels();

        /**
         * MOTOR DE JUEGO (ARQUITECTURA DE FLUJO DE APRENDIZAJE)
         */
        class EnglishAdventure {
            constructor() {
                this.currentLevel = null;
                this.flowStep = 0; 
                this.currentQuestionIdx = 0;
                this.totalLevels = 10;
                this.dragSelectedTokens = [];
                
                this.player = JSON.parse(localStorage.getItem('ea_player_save')) || {
                    stars: 0,
                    unlockedLevels: [1],
                    completedLevels: [],
                    vocabulary: []
                };
                
                this.teacherMode = true;
            }

            init() {
                this.renderMap();
                this.updateGlobalUI();
                this.switchTab('map');
            }

            saveProgress() {
                localStorage.setItem('ea_player_save', JSON.stringify(this.player));
                this.updateGlobalUI();
            }

            updateGlobalUI() {
                document.getElementById('global-star-count').innerText = this.player.stars;
                document.getElementById('global-vocab-count').innerText = this.player.vocabulary.length;
                
                let progressPercentage = Math.round((this.player.completedLevels.length / this.totalLevels) * 100);
                document.getElementById('progress-percentage-text').innerText = `${progressPercentage}%`;
                document.getElementById('map-progress-bar').style.width = `${progressPercentage}%`;
            }

            switchTab(tab) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                
                if (tab === 'map') {
                    document.getElementById('view-map').classList.add('active');
                    document.getElementById('tab-map').classList.add('active');
                    this.renderMap();
                } else if (tab === 'vocab') {
                    document.getElementById('view-vocabulary').classList.add('active');
                    document.getElementById('tab-vocab').classList.add('active');
                    this.renderVocabulary();
                }
            }

            toggleTeacherMode() {
                this.teacherMode = document.getElementById('teacher-mode-toggle').checked;
                const teacherBox = document.getElementById('dynamic-teacher-box');
                if (teacherBox) {
                    teacherBox.style.display = this.teacherMode ? 'flex' : 'none';
                }
            }

            renderMap() {
                const target = document.getElementById('map-nodes-target');
                target.innerHTML = '';
                
                for (let i = 1; i <= this.totalLevels; i++) {
                    const node = document.createElement('div');
                    node.className = 'level-node';
                    
                    let status = 'locked';
                    if (this.player.completedLevels.includes(i)) status = 'completed';
                    else if (this.player.unlockedLevels.includes(i)) status = 'unlocked';
                    
                    node.classList.add(status);
                    
                    let levelTitle = (CLASS_DATASET[i]) ? CLASS_DATASET[i].title : `Próximamente`;
                    let levelSubtitle = (CLASS_DATASET[i]) ? CLASS_DATASET[i].method : `Bloqueado`;
                    let starsMarkup = status === 'completed' ? '⭐⭐⭐' : ' Locked';
                    
                    node.innerHTML = `
                        <div class="level-bubble" onclick="app.startLevel(${i}, '${status}')">
                            ${status === 'completed' ? '✔' : i}
                        </div>
                        <div class="level-info-box">
                            <div class="level-title">${levelTitle}</div>
                            <div style="font-size:11px; color:#777;">${levelSubtitle}</div>
                            <div class="level-stars">${starsMarkup}</div>
                        </div>
                    `;
                    target.appendChild(node);
                }
            }

            startLevel(levelNum, status) {
                if (status === 'locked' || !CLASS_DATASET[levelNum]) {
                    alert("¡Este nivel aún está bloqueado! Completa los niveles anteriores.");
                    return;
                }
                this.currentLevel = levelNum;
                this.flowStep = 0; 
                this.currentQuestionIdx = 0;
                
                document.getElementById('view-map').classList.remove('active');
                document.getElementById('view-class').classList.add('active');
                document.getElementById('class-view-title').innerText = `Nivel ${levelNum}: ${CLASS_DATASET[levelNum].title}`;
                
                this.toggleTeacherMode();
                this.executeFlowStep();
            }

            exitToMap() {
                document.getElementById('view-class').classList.remove('active');
                this.switchTab('map');
            }

            executeFlowStep() {
                const fb = document.getElementById('action-feedback-panel');
                fb.className = 'feedback-panel';
                fb.style.display = 'none';

                document.getElementById('btn-flow-back').style.visibility = this.flowStep === 0 ? 'hidden' : 'visible';
                document.getElementById('btn-flow-next').innerText = "Siguiente";

                document.querySelectorAll('.step-dot').forEach((dot, idx) => {
                    dot.className = 'step-dot';
                    if (idx < this.flowStep) dot.classList.add('completed');
                    if (idx === this.flowStep) dot.classList.add('active');
                });

                const levelData = CLASS_DATASET[this.currentLevel];
                const speech = document.getElementById('teacher-speech-text');
                const core = document.getElementById('class-content-core');

                if (this.flowStep === 0) {
                    speech.innerText = "Hi there! Let's start by learning some essential words for this adventure. Listen carefully and add them to your log!";
                    
                    let html = `<div class="vocab-grid">`;
                    levelData.vocabItems.forEach((item, index) => {
                        html += `
                            <div class="vocab-card">
                                <div class="vocab-meta">
                                    <h4>${item.eng}</h4>
                                    <p><em>Pronunciación: / ${item.pr} /</em></p>
                                    <p style="color:var(--text-dark); margin-top:5px;"><strong>Significado:</strong> ${item.esp}</p>
                                    <p style="font-size:13px; color:#555;">Ej: ${item.ex}</p>
                                </div>
                                <button class="audio-icon-btn" onclick="app.speakText('${item.eng}')">🔊</button>
                            </div>
                        `;
                    });
                    html += `</div>`;
                    core.innerHTML = html;

                } else if (this.flowStep === 1) {
                    speech.innerText = "Great! Now let's dive into the grammar rules. Review the structures and look at the contextual examples below.";
                    
                    let html = `<div style="padding:10px;">${levelData.explain}`;
                    html += `<h3 style="margin-top:20px; color:var(--secondary-dark);">Examples:</h3><ul class="example-list">`;
                    levelData.examples.forEach(ex => {
                        html += `
                            <li class="example-item">
                                <div>
                                    <span class="example-eng">${ex.eng}</span><br>
                                    <span class="example-esp">${ex.esp}</span>
                                </div>
                                <button class="audio-icon-btn" onclick="app.speakText('${ex.eng.replace(/(\(\+\)|\(-\))/g,'')}')">🔊</button>
                            </li>
                        `;
                    });
                    html += `</ul></div>`;
                    core.innerHTML = html;

                } else if (this.flowStep === 2) {
                    this.renderQuestionStep();

                } else if (this.flowStep === 3) {
                    speech.innerText = "Awesome job! You have conquered this level. Read the summary and claim your stars!";
                    core.innerHTML = `<div style="padding:15px; text-align:center;">${levelData.summary}<br>🚀 ¡Listo para desbloquear nuevos horizontes!</div>`;
                    document.getElementById('btn-flow-next').innerText = "Reclamar Recompensas 🎉";
                }
            }

            renderQuestionStep() {
                const levelData = CLASS_DATASET[this.currentLevel];
                const q = levelData.questions[this.currentQuestionIdx];
                const speech = document.getElementById('teacher-speech-text');
                const core = document.getElementById('class-content-core');

                speech.innerText = `Question ${this.currentQuestionIdx + 1} of ${levelData.questions.length}: Challenge your skills!`;
                this.dragSelectedTokens = []; 

                let trackerHtml = `<div class="subquestion-tracker">`;
                for (let i = 0; i < levelData.questions.length; i++) {
                    let cls = '';
                    if (i === this.currentQuestionIdx) cls = 'current';
                    trackerHtml += `<div class="sub-badge ${cls}">${i + 1}</div>`;
                }
                trackerHtml += `</div>`;

                let bodyHtml = `<div style="margin-bottom:15px; font-size:18px; font-weight:bold;">${q.question}</div>`;

                if (q.type === 'multiple-choice') {
                    bodyHtml += `<div class="options-grid">`;
                    q.options.forEach(opt => {
                        bodyHtml += `<div class="option-card" onclick="app.selectOptionCard(this, '${opt}')">${opt}</div>`;
                    });
                    bodyHtml += `</div>`;

                } else if (q.type === 'writing-validation') {
                    bodyHtml += `
                        <input type="text" class="text-input-field" id="write-field-target" placeholder="Escribe tu respuesta aquí..." autocomplete="off">
                        <p style="margin-top:10px; font-size:12px; color:#777;">Nota: Se validan mayúsculas/minúsculas de forma flexible.</p>
                    `;

                } else if (q.type === 'drag-drop') {
                    bodyHtml += `<div class="drop-zone" id="drop-zone-target">Haz clic en las palabras para ordenarlas</div>`;
                    bodyHtml += `<div class="drag-container">`;
                    q.pool.forEach((word, idx) => {
                        bodyHtml += `<div class="drag-item" data-idx="${idx}" onclick="app.handleTokenClick(this, '${word}')">${word}</div>`;
                    });
                    bodyHtml += `</div>`;

                } else if (q.type === 'listening-api') {
                    bodyHtml += `
                        <div style="text-align:center; margin:15px 0;">
                            <button class="btn btn-secondary" onclick="app.speakText('${q.phraseToSpeak}')" style="border-radius:50%; width:70px; height:70px; font-size:24px; padding:0; display:inline-flex; justify-content:center; align-items:center;">🔊</button>
                            <p style="font-size:12px; color:#555; margin-top:5px;">Click para reproducir</p>
                        </div>
                        <div class="options-grid">
                    `;
                    q.options.forEach(opt => {
                        bodyHtml += `<div class="option-card" onclick="app.selectOptionCard(this, '${opt}')">${opt}</div>`;
                    });
                    bodyHtml += `</div>`;
                }

                core.innerHTML = trackerHtml + bodyHtml;
                document.getElementById('btn-flow-next').innerText = "Verificar Respuesta 🔍";
            }

            selectOptionCard(element, val) {
                document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
                element.classList.add('selected');
                element.dataset.selectedVal = val;
            }

            handleTokenClick(el, word) {
                if (el.classList.contains('used')) return;
                el.classList.add('used');
                this.dragSelectedTokens.push({ id: el.dataset.idx, text: word });
                this.rebuildDropZone();
            }

            rebuildDropZone() {
                const dz = document.getElementById('drop-zone-target');
                if (this.dragSelectedTokens.length === 0) {
                    dz.innerText = "Haz clic en las palabras para ordenarlas";
                    return;
                }
                dz.innerHTML = '';
                this.dragSelectedTokens.forEach((tok, index) => {
                    const span = document.createElement('div');
                    span.className = 'drag-item';
                    span.innerText = tok.text;
                    span.onclick = (e) => {
                        e.stopPropagation();
                        this.removeTokenAt(index, tok.id);
                    };
                    dz.appendChild(span);
                });
            }

            removeTokenAt(index, tokenOriginalId) {
                this.dragSelectedTokens.splice(index, 1);
                const originalCard = document.querySelector(`.drag-item[data-idx="${tokenOriginalId}"]`);
                if (originalCard) originalCard.classList.remove('used');
                this.rebuildDropZone();
            }

            flowNext() {
                const levelData = CLASS_DATASET[this.currentLevel];
                
                if (this.flowStep === 2) {
                    const q = levelData.questions[this.currentQuestionIdx];
                    const nextBtnText = document.getElementById('btn-flow-next').innerText;
                    
                    if (nextBtnText.startsWith("Verificar")) {
                        this.validateQuestionAnswer(q);
                    } else {
                        if (this.currentQuestionIdx < levelData.questions.length - 1) {
                            this.currentQuestionIdx++;
                            this.renderQuestionStep();
                        } else {
                            this.flowStep++;
                            this.executeFlowStep();
                        }
                    }
                    return;
                }

                if (this.flowStep === 3) {
                    this.completeLevelSuccess();
                } else {
                    if (this.flowStep === 0) {
                        levelData.vocabItems.forEach(item => {
                            if (!this.player.vocabulary.some(v => v.eng === item.eng)) {
                                this.player.vocabulary.push(item);
                            }
                        });
                        this.saveProgress();
                    }
                    this.flowStep++;
                    this.executeFlowStep();
                }
            }

            flowPrevious() {
                if (this.flowStep > 0) {
                    if (this.flowStep === 2 && this.currentQuestionIdx > 0) {
                        this.currentQuestionIdx--;
                        this.renderQuestionStep();
                    } else {
                        this.flowStep--;
                        this.executeFlowStep();
                    }
                }
            }

            validateQuestionAnswer(q) {
                let userVal = "";
                let isCorrect = false;

                if (q.type === 'multiple-choice' || q.type === 'listening-api') {
                    const selected = document.querySelector('.option-card.selected');
                    if (!selected) { alert("¡Por favor, selecciona una opción!"); return; }
                    userVal = selected.dataset.selectedVal;
                    isCorrect = (userVal === q.correct);

                } else if (q.type === 'writing-validation') {
                    const targetEl = document.getElementById('write-field-target');
                    if (!targetEl) return;
                    userVal = targetEl.value.trim().toLowerCase();
                    if (!userVal) { alert("¡Por favor, escribe tu respuesta!"); return; }
                    isCorrect = q.accepted.some(ans => ans.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"") === userVal.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,""));

                } else if (q.type === 'drag-drop') {
                    if (this.dragSelectedTokens.length < q.correctOrder.length) { alert("¡Ordena la frase completa!"); return; }
                    const userOrder = this.dragSelectedTokens.map(t => t.text);
                    isCorrect = JSON.stringify(userOrder) === JSON.stringify(q.correctOrder);
                    userVal = userOrder.join(" ");
                }

                const panel = document.getElementById('action-feedback-panel');
                const msg = document.getElementById('feedback-main-message');
                const exp = document.getElementById('feedback-explanation-text');

                panel.className = 'feedback-panel ' + (isCorrect ? 'correct' : 'wrong');
                msg.innerText = isCorrect ? "🎉 ¡Excelente! Respuesta Correcta" : "❌ Respuesta Incorrecta";
                exp.innerHTML = `<strong>Explicación:</strong> ${q.exp || ''}`;
                panel.style.display = 'block';

                if (isCorrect) {
                    this.player.stars += 5; 
                    this.saveProgress();
                }

                document.getElementById('btn-flow-next').innerText = "Continuar ➡️";
            }

            completeLevelSuccess() {
                if (!this.player.completedLevels.includes(this.currentLevel)) {
                    this.player.completedLevels.push(this.currentLevel);
                }
                
                let nextLevel = this.currentLevel + 1;
                if (nextLevel <= this.totalLevels && !this.player.unlockedLevels.includes(nextLevel)) {
                    this.player.unlockedLevels.push(nextLevel);
                }

                this.saveProgress();

                if (this.player.completedLevels.length === this.totalLevels) {
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                    document.getElementById('view-final').classList.add('active');
                } else {
                    this.exitToMap();
                }
            }

            renderVocabulary() {
                const grid = document.getElementById('vocab-cards-grid');
                grid.innerHTML = '';
                
                if (this.player.vocabulary.length === 0) {
                    grid.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#888; padding:30px;">Tu bitácora está vacía. ¡Completa niveles en el mapa para recolectar vocabulario! 📚</p>`;
                    return;
                }

                this.player.vocabulary.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'vocab-card';
                    card.innerHTML = `
                        <div class="vocab-meta">
                            <h4>${item.eng}</h4>
                            <p style="color:#666;"><strong>${item.esp}</strong></p>
                            <p style="font-size:12px; color:var(--text-light)">Pronunciación: /${item.pr}/</p>
                            <p style="font-size:13px; margin-top:4px; color:#555;">${item.ex}</p>
                        </div>
                        <button class="audio-icon-btn" onclick="app.speakText('${item.eng}')">🔊</button>
                    `;
                    grid.appendChild(card);
                });
            }

            downloadVocabularyJSON() {
                if (this.player.vocabulary.length === 0) {
                    alert("No tienes vocabulario registrado para exportar.");
                    return;
                }
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(this.player.vocabulary, null, 2));
                const downloadAnchor = document.createElement('a');
                downloadAnchor.setAttribute("href", dataStr);
                downloadAnchor.setAttribute("download", "my_vocabulary_adventure.json");
                document.body.appendChild(downloadAnchor);
                downloadAnchor.click();
                downloadAnchor.remove();
            }

            speakText(text) {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel(); 
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9; 
                    window.speechSynthesis.speak(utterance);
                } else {
                    alert("Tu navegador no soporta la API de síntesis de voz.");
                }
            }

            resetProgress() {
                if (confirm("¿Seguro que deseas reiniciar tu progreso por completo? Perderás tus estrellas y vocabulario guardado.")) {
                    localStorage.removeItem('ea_player_save');
                    this.player = { stars: 0, unlockedLevels: [1], completedLevels: [], vocabulary: [] };
                    this.saveProgress();
                    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                    document.getElementById('view-map').classList.add('active');
                    this.init();
                }
            }
        }

        const app = new EnglishAdventure();
        window.onload = () => {
            app.init();
        };
    </script>
</body>
</html>
